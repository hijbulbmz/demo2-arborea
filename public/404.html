<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Arborea Skincare</title>
  <style>
    body {
      background-color: #fbf7f1;
      color: #1c1c1c;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
      color: #4a5d4e;
    }
    .card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 2rem;
      padding: 40px;
      box-shadow: 0 20px 40px -15px rgba(74, 93, 78, 0.08);
      max-width: 400px;
    }
    h1 {
      font-size: 1.8rem;
      margin: 0 0 10px 0;
    }
    p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0 0 25px 0;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1c1c1c;
      color: #fff;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background: #8c6239;
      transform: translateY(-2px);
    }
  </style>
  <script type="text/javascript">
    // Automatic router fallback redirect
    var path = window.location.pathname;
    if (path && path !== '/demo-arborea/' && path !== '/demo-arborea') {
      // Extract sub-route and redirect via HashRouter
      var subRoute = path.replace('/demo-arborea', '');
      window.location.replace('/demo-arborea/#' + subRoute + window.location.search + window.location.hash);
    }
  </script>
</head>
<body>
  <div class="card">
    <div class="logo">Arborea</div>
    <h1>Redirecting to Routine...</h1>
    <p>We are matching your path with the luxury botanical catalog formulas. You will be redirected in a moment.</p>
    <a href="/demo-arborea/" class="btn">Go Home</a>
  </div>
</body>
</html>
